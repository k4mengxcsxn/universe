<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}
    #info{
      position:fixed;top:24px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,0.55);font-size:12px;letter-spacing:3px;
      text-transform:uppercase;pointer-events:none;
      text-shadow:0 0 20px rgba(180,100,255,0.6);
    }
    #controls{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      display:flex;gap:12px;align-items:center;pointer-events:all;
    }
    .btn{
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.7);padding:8px 20px;border-radius:30px;
      cursor:pointer;font-size:11px;letter-spacing:2px;transition:all 0.3s;
      backdrop-filter:blur(10px);text-transform:uppercase;
    }
    .btn:hover{background:rgba(180,100,255,0.2);border-color:rgba(180,100,255,0.5);color:#fff;}
    .btn.active{background:rgba(180,100,255,0.25);border-color:rgba(180,100,255,0.6);color:#e0c0ff;}
    #stats{
      position:fixed;top:24px;right:24px;
      color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:1px;line-height:1.8;
      text-align:right;pointer-events:none;
    }
    #brightness-wrap{
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      display:flex;align-items:center;gap:12px;pointer-events:all;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
      border-radius:30px;padding:8px 20px;backdrop-filter:blur(10px);
    }
    #brightness-wrap label{
      color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:2px;
      text-transform:uppercase;white-space:nowrap;
    }
    #brightness-val{
      color:rgba(180,100,255,0.9);font-size:10px;letter-spacing:1px;
      min-width:28px;text-align:right;
    }
    #brightness-slider{
      -webkit-appearance:none;appearance:none;
      width:130px;height:3px;border-radius:2px;outline:none;cursor:pointer;
      background:linear-gradient(to right,rgba(180,100,255,0.8) var(--pct,50%),rgba(255,255,255,0.15) var(--pct,50%));
    }
    #brightness-slider::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
      background:rgba(200,140,255,1);box-shadow:0 0 8px rgba(180,100,255,0.8);
      transition:transform 0.15s;
    }
    #brightness-slider::-webkit-slider-thumb:hover{transform:scale(1.3);}
    #brightness-slider::-moz-range-thumb{
      width:14px;height:14px;border-radius:50%;border:none;
      background:rgba(200,140,255,1);box-shadow:0 0 8px rgba(180,100,255,0.8);
    }
    #overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      pointer-events:none;
      background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
    }
  </style>
</head>
<body>
<div id="info">Universe · Drag to rotate · Scroll to zoom</div>
<div id="stats">
  <div id="fps">-- fps</div>
  <div>150k particles</div>
  <div>GLSL shaders</div>
</div>
<div id="brightness-wrap">
  <label>✦ Brightness</label>
  <input type="range" id="brightness-slider" min="0" max="100" value="50">
  <span id="brightness-val">50%</span>
</div>
<div id="controls">
  <button class="btn active" id="btn-rotate">Auto Rotate</button>
  <button class="btn" id="btn-color">Color Mode</button>
  <button class="btn" id="btn-rings">Toggle Rings</button>
</div>
<div id="overlay"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#060010');
scene.fog = new THREE.FogExp2('#0a0020', 0.004);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 12, 38);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.4, 0.5, 0.0);
composer.addPass(bloom);
composer.addPass(new OutputPass());

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 8;
controls.maxDistance = 120;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

let colorMode = 0; // 0=purple, 1=fire, 2=ice, 3=gold
let showRings = true;
let autoRotate = true;

const colorModes = [
  [new THREE.Color('#2a289a'), new THREE.Color('#d17cc4')],
  [new THREE.Color('#8a1500'), new THREE.Color('#ffb347')],
  [new THREE.Color('#003366'), new THREE.Color('#88ddff')],
  [new THREE.Color('#5a3800'), new THREE.Color('#ffe066')],
];
const modeNames = ['Nebula','Fire','Ice','Gold'];

const gu = {
  time: {value: 0},
  colorA: {value: colorModes[0][0]},
  colorB: {value: colorModes[0][1]},
};

const sizes = [], shift = [];
const pushShift = () => {
  shift.push(
    Math.random()*Math.PI,
    Math.random()*Math.PI*2,
    (Math.random()*0.9+0.1)*Math.PI*0.1,
    Math.random()*0.9+0.1
  );
};

const pts = new Array(60000).fill(null).map(()=>{
  sizes.push(Math.random()*2+0.5);
  pushShift();
  return new THREE.Vector3().randomDirection().multiplyScalar(Math.random()*0.5+9.5);
});

for(let i=0;i<110000;i++){
  let r=10, R=48;
  let rand=Math.pow(Math.random(),1.5);
  let radius=Math.sqrt(R*R*rand+(1-rand)*r*r);
  let height=(Math.random()-0.5)*2.5;
  
  if(radius>35) height*=0.3;
  pts.push(new THREE.Vector3().setFromCylindricalCoords(radius, Math.random()*2*Math.PI, height));
  sizes.push(Math.random()*1.8+0.3);
  pushShift();
}

const geo = new THREE.BufferGeometry().setFromPoints(pts);
geo.setAttribute('sizes', new THREE.Float32BufferAttribute(sizes, 1));
geo.setAttribute('shift', new THREE.Float32BufferAttribute(shift, 4));

const mat = new THREE.PointsMaterial({
  size: 0.13,
  transparent: true,
  depthTest: false,
  blending: THREE.AdditiveBlending,
  onBeforeCompile: shader => {
    shader.uniforms.time  = gu.time;
    shader.uniforms.colorA= gu.colorA;
    shader.uniforms.colorB= gu.colorB;
    shader.vertexShader = `
      uniform float time;
      uniform vec3 colorA;
      uniform vec3 colorB;
      attribute float sizes;
      attribute vec4 shift;
      varying vec3 vColor;
      varying float vAlpha;
      ${shader.vertexShader}
    `.replace(
      `gl_PointSize = size;`,
      `gl_PointSize = size * sizes;`
    ).replace(
      `#include <color_vertex>`,
      `#include <color_vertex>
      float d = length(abs(position) / vec3(48., 12., 48.));
      d = clamp(d, 0., 1.);
      vColor = mix(colorA, colorB, d);

      float centerDist = length(position.xz);
      vAlpha = 1.0 - smoothstep(0.0, 50.0, centerDist) * 0.4;
    `).replace(
      `#include <begin_vertex>`,
      `#include <begin_vertex>
      float t = time;
      float moveT = mod(shift.x + shift.z * t, PI2);
      float moveS = mod(shift.y + shift.z * t, PI2);
      transformed += vec3(cos(moveS)*sin(moveT), cos(moveT), sin(moveS)*sin(moveT)) * shift.a;
    `);
    shader.fragmentShader = `
      varying vec3 vColor;
      varying float vAlpha;
      ${shader.fragmentShader}
    `.replace(
      `#include <clipping_planes_fragment>`,
      `#include <clipping_planes_fragment>
      float d = length(gl_PointCoord.xy - 0.5);
      if(d > 0.5) discard;
    `).replace(
      `vec4 diffuseColor = vec4( diffuse, opacity );`,
      `vec4 diffuseColor = vec4(vColor, smoothstep(0.5, 0.05, d) * vAlpha);`
    );
  }
});

const points = new THREE.Points(geo, mat);
points.rotation.order = 'ZYX';
points.rotation.z = 0.18;
scene.add(points);

const ringGroup = new THREE.Group();
scene.add(ringGroup);

const ringDefs = [
  {inner:11, outer:13.5, opacity:0.6, hue:0.72},
  {inner:14, outer:17,   opacity:0.75, hue:0.68},
  {inner:17.5,outer:20,  opacity:0.55, hue:0.65},
  {inner:20.5,outer:21.5,opacity:0.35, hue:0.75},
  {inner:22,  outer:25,  opacity:0.5,  hue:0.7},
];

ringDefs.forEach(def=>{
  const ringGeo = new THREE.RingGeometry(def.inner, def.outer, 256);

  const pos = ringGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const r=Math.sqrt(pos.getX(i)**2+pos.getY(i)**2);
    const angle=Math.atan2(pos.getY(i),pos.getX(i));
    const noise=(Math.random()-0.5)*0.25;
    pos.setXY(i, (r+noise)*Math.cos(angle), (r+noise)*Math.sin(angle));
  }
  pos.needsUpdate=true;

  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(def.hue, 0.6, 0.65),
    side: THREE.DoubleSide,
    transparent: true,
    opacity: def.opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  ringGroup.add(ring);
});

const ringPts=[], ringSizes=[];
for(let i=0;i<30000;i++){
  const inner=10.5, outer=26;
  const r=inner+Math.random()*(outer-inner);
  const angle=Math.random()*Math.PI*2;
  const y=(Math.random()-0.5)*0.3;
  ringPts.push(new THREE.Vector3(Math.cos(angle)*r, y, Math.sin(angle)*r));
  ringSizes.push(Math.random()*1.5+0.5);
}
const ringDustGeo = new THREE.BufferGeometry().setFromPoints(ringPts);
ringDustGeo.setAttribute('sizes', new THREE.Float32BufferAttribute(ringSizes,1));
const ringDustMat = new THREE.PointsMaterial({
  size:0.06, transparent:true, depthTest:false,
  blending:THREE.AdditiveBlending,
  color: new THREE.Color('#c8a0ff'),
  onBeforeCompile: s=>{
    s.vertexShader = s.vertexShader
      .replace(`gl_PointSize = size;`,`gl_PointSize = size * sizes;`);
    s.vertexShader = `attribute float sizes;\n`+s.vertexShader;
    s.fragmentShader = s.fragmentShader
      .replace(`#include <clipping_planes_fragment>`,
        `#include <clipping_planes_fragment>
        float d=length(gl_PointCoord.xy-0.5);
        if(d>0.5)discard;`)
      .replace(`vec4 diffuseColor = vec4( diffuse, opacity );`,
        `vec4 diffuseColor = vec4(diffuse, smoothstep(0.5,0.1,d)*0.8);`);
  }
});
const ringDust = new THREE.Points(ringDustGeo, ringDustMat);
ringGroup.add(ringDust);

const glowGeo = new THREE.SphereGeometry(5, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color('#6020c0'),
  transparent:true, opacity:0.08,
  blending:THREE.AdditiveBlending,
  depthWrite:false,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

const spriteCanvas = document.createElement('canvas');
spriteCanvas.width=spriteCanvas.height=128;
const sc=spriteCanvas.getContext('2d');
const sg=sc.createRadialGradient(64,64,0,64,64,64);
sg.addColorStop(0,'rgba(160,80,255,0.8)');
sg.addColorStop(0.3,'rgba(100,40,200,0.4)');
sg.addColorStop(1,'transparent');
sc.fillStyle=sg; sc.fillRect(0,0,128,128);
const spriteTex=new THREE.CanvasTexture(spriteCanvas);
const spriteMat=new THREE.SpriteMaterial({map:spriteTex,blending:THREE.AdditiveBlending,transparent:true,opacity:0.6});
const sprite=new THREE.Sprite(spriteMat);
sprite.scale.set(20,20,1);
scene.add(sprite);

document.getElementById('btn-rotate').addEventListener('click', e=>{
  autoRotate=!autoRotate;
  controls.autoRotate=autoRotate;
  e.target.classList.toggle('active',autoRotate);
});
document.getElementById('btn-color').addEventListener('click', e=>{
  colorMode=(colorMode+1)%4;
  gu.colorA.value.copy(colorModes[colorMode][0]);
  gu.colorB.value.copy(colorModes[colorMode][1]);
  e.target.textContent=modeNames[(colorMode+1)%4];

  const hues=[0.72,0.05,0.55,0.12];
  const h=hues[colorMode];
  ringGroup.children.forEach(child=>{
    if(child.material&&child.material.color)
      child.material.color.setHSL(h,0.6,0.65);
  });
  ringDustMat.color.setHSL(h,0.7,0.75);
  glowMat.color.setHSL(h,0.8,0.4);
  spriteMat.color=new THREE.Color().setHSL(h,0.8,0.6);
});
document.getElementById('btn-rings').addEventListener('click', e=>{
  showRings=!showRings;
  ringGroup.visible=showRings;
  e.target.classList.toggle('active',showRings);
});

const brightnessSlider = document.getElementById('brightness-slider');
const brightnessVal = document.getElementById('brightness-val');
let brightnessLevel = 0.5;

const updateBrightness = () => {
  const v = parseInt(brightnessSlider.value);
  brightnessLevel = v / 100;
  brightnessVal.textContent = v + '%';
  brightnessSlider.style.setProperty('--pct', v + '%');

  renderer.toneMappingExposure = 0.3 + brightnessLevel * 2.1;
  bloom.strength = 0.4 + brightnessLevel * 2.0;
};
brightnessSlider.addEventListener('input', updateBrightness);
updateBrightness();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

const clock = new THREE.Clock();
let frames=0, lastFpsTime=performance.now();
const fpsEl=document.getElementById('fps');

renderer.setAnimationLoop(()=>{
  const elapsed=clock.getElapsedTime();
 frames++;
const now=performance.now();
if(now-lastFpsTime>=1000){
  fpsEl.textContent=Math.round(frames*1000/(now-lastFpsTime))+' fps';
  frames=0; lastFpsTime=now;
}
  
  controls.update();
  gu.time.value=elapsed*0.5*Math.PI;
  points.rotation.y=elapsed*0.04;
  ringGroup.rotation.y=elapsed*0.02;

  ringGroup.rotation.x=Math.sin(elapsed*0.15)*0.04;

  glowMat.opacity=0.06+0.04*Math.sin(elapsed*0.8);
  spriteMat.opacity=0.5+0.2*Math.sin(elapsed*0.6);

  bloom.strength=(0.4 + brightnessLevel * 2.0) + 0.15*Math.sin(elapsed*0.5);

  composer.render();
});
</script>
</body>
</html>
